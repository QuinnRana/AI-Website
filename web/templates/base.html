<!doctype html>
<html lang="en">

  <title>{{ ai_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="brand">{{ ai_name }}</div>

  </footer>

</html>
